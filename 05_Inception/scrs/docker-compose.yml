services:
  nginx:
    container_name: nginx
    build: ./requirements/nginx
    depends_on:
      - adminer
    ports:
      - 443:443
    volumes:
      - /home/${USER}/Inception/data/wordpress:/var/www/html
    restart: always
    networks:
      - network

  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    volumes:
      - /home/${USER}/Inception/data/mysql:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - network
    restart: always
    env_file:
      - .env

  wordpress:
    container_name: wordpress
    depends_on:
      - mariadb
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    volumes:
      - /home/${USER}/Inception/data/wordpress:/var/www/html
    networks:
      - network

#BONUS PART
  redis:
    container_name: redis
    build: ./requirements/bonus/redis
    depends_on:
      - wordpress
    ports:
     - '6379:6379'
    restart: always
    env_file:
      - .env
    networks:
      - network

  ftp-server:
    build: requirements/bonus/ftp_server
    container_name: ftp-server
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    volumes:
      - "/home/${USER}/Inception/data/wordpress:/var/www/html"
    networks:
      - network
    restart: always
    env_file:
      - .env

  adminer:
    container_name: adminer
    build: ./requirements/bonus/adminer
    restart: always
    depends_on:
      - mariadb
      - wordpress
    ports:
      - "8080:8080"
    expose:
     - "8080"
    networks:
      - network
    env_file:
      - .env

  ollama:
    build: requirements/bonus/ollama
    container_name: ollama-ai
    ports:
      - "11434:11434"
    volumes:
      - /home/${USER}/Inception/data/ollama:/root/.ollama
      - /home/${USER}/Inception/data/models:/models
    restart: unless-stopped
    networks:
      - network
    env_file:
      - .env

  static_site:
    container_name: static_site
    build: ./requirements/bonus/static_site
    restart: always
    env_file:
      - .env
    networks:
      - network

networks:
  network:
    driver: bridge
