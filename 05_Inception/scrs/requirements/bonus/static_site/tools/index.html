<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inception | System Dashboard</title>
    <style>
        :root { 
            --neon-green: #00ff41; 
            --bg-dark: #0a0a0a; 
            --panel-bg: #161616; 
            --ram-blue: #0080ff;
        }
        body { 
            background: var(--bg-dark); 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        .header { 
            border-bottom: 2px solid var(--neon-green); 
            width: 100%; 
            text-align: center; 
            padding: 20px 0; 
            background: var(--panel-bg); 
        }
        h1 { color: var(--neon-green); margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 1.5rem; }
        
        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            width: 90%; 
            max-width: 1100px; 
            margin: 40px 0; 
        }
        
        .card { 
            background: var(--panel-bg); 
            border: 1px solid #333; 
            padding: 20px; 
            border-radius: 5px; 
        }
        .card h3 { margin-top: 0; color: var(--neon-green); border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 1rem; }
        
        .status { display: flex; align-items: center; font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; margin-right: 10px; display: inline-block; }
        .online { background-color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
        .offline { background-color: #ff3e3e; box-shadow: 0 0 10px #ff3e3e; }
        
        .info { font-size: 0.75rem; color: #888; margin: 10px 0; line-height: 1.4; }
        
        .btn { 
            display: inline-block; 
            margin-top: 10px; 
            padding: 10px 18px; 
            border: 1px solid var(--neon-green); 
            color: var(--neon-green); 
            text-decoration: none; 
            font-size: 0.8rem;
            background: transparent;
            cursor: pointer;
        }
        .btn:hover { background: var(--neon-green); color: black; }
        
        .meter-bg { background: #222; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px;}
        .meter-fill { height: 100%; transition: width 0.8s ease-in-out; }

        #model-list { list-style: none; padding: 0; margin: 15px 0 0 0; font-size: 0.85rem; }
        #model-list li { padding: 6px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Inception Monitor</h1>
        <p style="font-size: 0.8rem; color: #666;">jumarque.42.fr | System Dashboard</p>
    </div>

    <div class="dashboard">
        
        <div class="card">
            <h3>WordPress Service</h3>
            <div class="status"><span class="dot online"></span> PHP-FPM 7.4</div>
            <p class="info">Main Application Container</p>
            <a href="https://jumarque.42.fr" class="btn">Visit WP</a>
        </div>

        <div class="card">
            <h3>MariaDB Database</h3>
            <div id="db-status" class="status"><span class="dot offline"></span> CHECKING...</div>
            <p class="info">Database Engine via Adminer Gateway.</p>
            <a href="https://jumarque.42.fr/adminer" class="btn">Open Adminer</a>
        </div>

        <div class="card">
            <h3>Resources</h3>
            <span style="font-size: 0.7rem; color: #666;">CPU LOAD</span>
            <div class="meter-bg"><div id="cpu-bar" class="meter-fill" style="background: var(--neon-green); width: 15%;"></div></div>
            <span style="font-size: 0.7rem; color: #666; display: block; margin-top: 10px;">RAM USAGE</span>
            <div class="meter-bg"><div id="ram-bar" class="meter-fill" style="background: var(--ram-blue); width: 55%;"></div></div>
        </div>

        <div class="card" style="grid-column: span 2;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h3>Ollama AI Engine</h3>
                    <div id="ollama-status" class="status"><span class="dot offline"></span> DISCONNECTED</div>
                </div>
                <button onclick="fetchAll()" class="btn" style="margin-top: 0;">RESCAN SYSTEM</button>
            </div>
            <ul id="model-list">
                <li>Scanning models...</li>
            </ul>
        </div>
    </div>

    <script>
        async function checkMariaDB() {
            const dbStatus = document.getElementById('db-status');
            try {
                // Hacemos un fetch a Adminer. Si el contenedor está arriba, responderá algo.
                const resp = await fetch('https://jumarque.42.fr/adminer/', { mode: 'no-cors' });
                dbStatus.innerHTML = '<span class="dot online"></span> DATABASE READY';
            } catch (e) {
                dbStatus.innerHTML = '<span class="dot offline"></span> DB UNREACHABLE';
            }
        }

        async function updateModels() {
            const statusDiv = document.getElementById('ollama-status');
            const listUl = document.getElementById('model-list');
            const cpuBar = document.getElementById('cpu-bar');
            
            cpuBar.style.width = "90%";
            
            try {
                const response = await fetch('/api/models');
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                statusDiv.innerHTML = '<span class="dot online"></span> AI ENGINE ONLINE';
                listUl.innerHTML = '';

                if (data.models && data.models.length > 0) {
                    data.models.forEach(m => {
                        const li = document.createElement('li');
                        li.innerHTML = `<span style="color:var(--neon-green)">[OK]</span> <strong>${m.name}</strong> (${(m.size/1e9).toFixed(2)} GB)`;
                        listUl.appendChild(li);
                    });
                } else {
                    listUl.innerHTML = '<li>Connected, but no models found.</li>';
                }
            } catch (err) {
                statusDiv.innerHTML = '<span class="dot offline"></span> AI API BLOCKED';
                listUl.innerHTML = '<li style="color:#ff3e3e">Check Nginx CORS or Container status.</li>';
            } finally {
                setTimeout(() => { cpuBar.style.width = "25%"; }, 1000);
            }
        }

        function fetchAll() {
            checkMariaDB();
            updateModels();
        }

        // Carga inicial
        fetchAll();
        setInterval(() => {
            document.getElementById('ram-bar').style.width = (Math.random() * (65 - 55) + 55) + "%";
        }, 3000);
    </script>
</body>
</html>
