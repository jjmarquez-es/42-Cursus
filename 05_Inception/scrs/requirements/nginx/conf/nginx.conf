server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name jumarque.42.fr;

    # Certificados corregidos
    ssl_certificate     /etc/nginx/ssl/jumarque.crt;
    ssl_certificate_key /etc/nginx/ssl/jumarque.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Configuración de PHP para WordPress
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Adminer
    location /adminer {
        rewrite ^/adminer$ /adminer/ permanent;
        location ~ ^/adminer/(.*)$ {
            include fastcgi_params;
            fastcgi_pass adminer:8080;
            fastcgi_param SCRIPT_FILENAME /var/www/html/index.php;
        }
    }

	location /ollama/ {
		proxy_pass http://ollama-ai:11434/;
		proxy_set_header Host $host;

		# --- INICIO CABECERAS CORS ---
		# Permite específicamente a tu subdominio estático
		add_header 'Access-Control-Allow-Origin' 'https://static.jumarque.42.fr' always;
		add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
		add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
		add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

		# Manejo de peticiones "preflight" (OPTIONS)
		if ($request_method = 'OPTIONS') {
			add_header 'Access-Control-Allow-Origin' 'https://static.jumarque.42.fr' always;
			add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
			add_header 'Access-Control-Max-Age' 1728000;
			add_header 'Content-Type' 'text/plain; charset=utf-8';
			add_header 'Content-Length' 0;
			return 204;
		}
		# --- FIN CABECERAS CORS ---
	}
}

# SEGUNDO SERVER: SITIO ESTÁTICO (BONUS)
server {
    listen 443 ssl;
    server_name static.jumarque.42.fr;

    # USA LOS MISMOS CERTIFICADOS QUE EL ANTERIOR
    ssl_certificate     /etc/nginx/ssl/jumarque.crt;
    ssl_certificate_key /etc/nginx/ssl/jumarque.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://static_site:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}